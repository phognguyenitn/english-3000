<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English 3000 - Pro Audio</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
        }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        .progress-container { margin-bottom: 1.5rem; }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }
        .stats-text { font-size: 0.85rem; color: var(--secondary); margin-bottom: 0.5rem; font-weight: 500; }
        
        .card { min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .word-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 0; }
        .word { font-size: 3rem; font-weight: 800; color: #1e293b; margin: 0; letter-spacing: -1px; }
        .speaker-icon { cursor: pointer; font-size: 1.5rem; color: var(--primary); transition: 0.2s; }
        .speaker-icon:hover { transform: scale(1.2); }

        .phonetic { color: var(--primary); font-family: monospace; font-size: 1.2rem; margin-bottom: 1.5rem; }
        
        .meaning-box { width: 100%; display: none; animation: fadeIn 0.3s ease; }
        .meaning { font-size: 1.4rem; font-weight: 600; color: #0f172a; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0; }
        
        .example-section { text-align: left; margin-bottom: 1rem; }
        .example-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
        .example-content { flex: 1; }
        .example-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); font-weight: 700; margin-bottom: 2px; display: block; }
        .example-text { font-size: 0.95rem; color: #334155; line-height: 1.4; font-style: italic; margin: 0; }
        .example-text b { color: var(--primary); font-style: normal; }

        .btn { border: none; padding: 1rem 1.5rem; border-radius: 0.75rem; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.2s; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        
        .controls { display: none; gap: 12px; margin-top: 1rem; }
        .btn-easy { background: var(--success); color: white; }
        .btn-hard { background: var(--danger); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="progress-container">
        <div id="stats" class="stats-text">Học tập trung...</div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>

    <div class="card">
        <div class="word-wrapper">
            <h1 id="wordDisplay" class="word">...</h1>
            <span class="speaker-icon" onclick="speak('wordDisplay')">🔊</span>
        </div>
        <div id="phoneticDisplay" class="phonetic">/.../</div>
        
        <div id="meaningBox" class="meaning-box">
            <div id="meaningDisplay" class="meaning">Nghĩa</div>
            
            <div class="example-section">
                <div class="example-row">
                    <div class="example-content">
                        <span class="example-label">Daily</span>
                        <p id="dailyEx" class="example-text"></p>
                    </div>
                    <span class="speaker-icon" onclick="speak('dailyEx')">🔊</span>
                </div>
                
                <div class="example-row">
                    <div class="example-content">
                        <span class="example-label">Technical</span>
                        <p id="techEx" class="example-text"></p>
                    </div>
                    <span class="speaker-icon" onclick="speak('techEx')">🔊</span>
                </div>
            </div>
        </div>
    </div>

    <button id="showBtn" class="btn btn-primary">Xem đáp án (Space)</button>
    
    <div id="controls" class="controls">
        <button onclick="handleAnswer(true)" class="btn btn-easy">Thuộc rồi (→)</button>
        <button onclick="handleAnswer(false)" class="btn btn-hard">Chưa thuộc</button>
    </div>
</div>

<script>
    const dictionary = [
        { 
            w: "Analyze", p: "/ˈæn.əl.aɪz/", m: "Phân tích",
            daily: "We need to <b>analyze</b> the results of the test.",
            tech: "The system will <b>analyze</b> the SQL execution plan for performance."
        },
        { 
            w: "Execute", p: "/ˈek.sɪ.kjuːt/", m: "Thực thi",
            daily: "They <b>executed</b> the plan perfectly.",
            tech: "Click the button to <b>execute</b> the stored procedure."
        },
        { 
            w: "Configuration", p: "/kənˌfɪɡ.jəˈreɪ.ʃən/", m: "Cấu hình",
            daily: "The <b>configuration</b> of the new office took two days.",
            tech: "Check the ERP <b>configuration</b> file for database settings."
        }
    ];

    let currentIndex = parseInt(localStorage.getItem('erp_idx')) || 0;
    let score = parseInt(localStorage.getItem('erp_score')) || 0;

    function speak(elementId) {
        const text = document.getElementById(elementId).innerText;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9; // Tốc độ đọc hơi chậm một chút để dễ nghe
        window.speechSynthesis.speak(utterance);
    }

    function render() {
        const data = dictionary[currentIndex];
        document.getElementById('wordDisplay').innerText = data.w;
        document.getElementById('phoneticDisplay').innerText = data.p;
        document.getElementById('meaningDisplay').innerText = data.m;
        document.getElementById('dailyEx').innerHTML = data.daily;
        document.getElementById('techEx').innerHTML = data.tech;
        
        document.getElementById('meaningBox').style.display = 'none';
        document.getElementById('showBtn').style.display = 'block';
        document.getElementById('controls').style.display = 'none';
        
        const progress = (score / dictionary.length) * 100;
        document.getElementById('progressFill').style.width = `${progress}%`;
        document.getElementById('stats').innerText = `Tiến độ: ${score}/${dictionary.length} từ`;
        
        // Tự động đọc từ mới khi chuyển sang
        speak('wordDisplay');
    }

    function show() {
        document.getElementById('meaningBox').style.display = 'block';
        document.getElementById('showBtn').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
    }

    function handleAnswer(isEasy) {
        if(isEasy) {
            score++;
            localStorage.setItem('erp_score', score);
        }
        currentIndex = (currentIndex + 1) % dictionary.length;
        localStorage.setItem('erp_idx', currentIndex);
        render();
    }

    document.getElementById('showBtn').addEventListener('click', show);
    
    document.addEventListener('keydown', (e) => {
        if(e.code === 'Space') show();
        if(e.code === 'ArrowRight' && document.getElementById('controls').style.display === 'flex') handleAnswer(true);
    });

    render();
</script>

</body>
</html>
